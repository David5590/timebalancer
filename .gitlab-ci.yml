image: node:latest

cache:
  paths:
    - node_modules/

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - npm ci --legacy-peer-deps
    - npm run build
  artifacts:
    paths:
      - build

deploy:
  stage: deploy
  script:
    - echo 'Deploying to GitLab Pages...'
    - cp -r build public
  artifacts:
    paths:
      - public
  only:
    - main
